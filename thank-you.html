<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — Own The Buyer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');

  :root{
    --ink:#101210;
    --steel:#1B2733;
    --gold:#E8A93A;
    --ember:#C9502A;
    --bone:#F1ECE1;
    --slate:#9BA6AF;
    --teal:#3FA089;
    --line: rgba(241,236,225,0.12);
    --radius: 3px;
  }
  *{box-sizing:border-box;}
  html, body{ max-width:100%; overflow-x:hidden; }
  body{
    margin:0;
    min-height:100vh;
    background:var(--ink);
    color:var(--bone);
    font-family:'Source Sans 3', sans-serif;
    line-height:1.6;
    -webkit-font-smoothing:antialiased;
    display:flex;
    flex-direction:column;
  }
  h1,h2,h3{
    font-family:'Oswald', sans-serif;
    text-transform:uppercase;
    letter-spacing:0.02em;
    margin:0;
  }
  .mono{ font-family:'JetBrains Mono', monospace; }
  a{ color:inherit; }
  .wrap{ max-width:640px; margin:0 auto; padding:0 24px; width:100%; }

  main{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:56px 0;
    background:
      radial-gradient(ellipse 700px 450px at 85% -10%, rgba(232,169,58,0.14), transparent 60%),
      radial-gradient(ellipse 600px 400px at 10% 110%, rgba(201,80,42,0.12), transparent 60%);
  }

  .card{
    width:100%;
    background:var(--steel);
    border:1px solid var(--line);
    border-radius:var(--radius);
    padding:44px 32px;
    text-align:center;
  }

  .check{
    width:64px; height:64px; margin:0 auto 22px;
    border-radius:50%;
    background:rgba(63,160,137,0.14);
    border:1px solid rgba(63,160,137,0.4);
    display:flex; align-items:center; justify-content:center;
  }
  .check svg{ width:30px; height:30px; }

  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--gold);
    margin-bottom:10px;
  }
  h1{ font-size:clamp(26px,6vw,36px); margin-bottom:14px; line-height:1.1; }
  .sub{ color:var(--slate); font-size:15px; max-width:44ch; margin:0 auto 30px; }

  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    width:100%;
    padding:17px 22px;
    border-radius:var(--radius);
    font-family:'Oswald'; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; font-size:15px;
    text-decoration:none; border:1px solid transparent; cursor:pointer;
  }
  .btn-primary{ background:var(--gold); color:var(--ink); }
  .btn-primary:hover{ background:#f2b752; }
  .btn-ghost{
    margin-top:12px;
    background:transparent; color:var(--bone); border-color:var(--line);
    font-size:13px; padding:13px 20px;
  }
  .btn-ghost:hover{ border-color:var(--gold); color:var(--gold); }

  .status{
    margin-top:22px;
    padding:13px 16px;
    border-radius:var(--radius);
    font-size:13px;
    font-family:'JetBrains Mono', monospace;
    display:none;
  }
  .status.show{ display:block; }
  .status.pending{ background:rgba(232,169,58,0.1); color:var(--gold); border:1px solid rgba(232,169,58,0.3); }
  .status.ready{ background:rgba(120,200,120,0.1); color:#8fdc8f; border:1px solid rgba(120,200,120,0.3); }

  .help{
    margin-top:28px;
    padding-top:22px;
    border-top:1px solid var(--line);
    font-size:12px;
    color:var(--slate);
  }
  .help a{ color:var(--gold); text-decoration:none; }
  .help a:hover{ text-decoration:underline; }

  @media (max-width: 600px){
    main{ padding:32px 0; }
    .card{ padding:32px 22px; }
  }
</style>
</head>
<body>

<main>
  <div class="wrap">
    <div class="card">
      <div class="check">
        <svg viewBox="0 0 24 24" fill="none" stroke="#3FA089" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20 6L9 17l-5-5"></path>
        </svg>
      </div>
      <div class="eyebrow">Payment received</div>
      <h1>You're in. Thank you.</h1>
      <p class="sub">Your copy of <strong>Own The Buyer</strong> is ready. Tap below to download your PDF — it's yours to keep, on any device.</p>

      <a class="btn btn-primary" href="own-the-buyer.pdf" download id="downloadBtn">Download Your PDF</a>
      <a class="btn btn-ghost" href="index.html">Back to homepage</a>

      <div class="help">
        Didn't get charged, or download not working? Message us on WhatsApp:<br>
        <a href="https://wa.me/256758133343" target="_blank" rel="noopener">0758 133 343</a> ·
        <a href="https://wa.me/256753553350" target="_blank" rel="noopener">0753 553 350</a>
      </div>
    </div>
  </div>
</main>

<script>
/* ============================================================
   Replace "own-the-buyer.pdf" above (and here) with the actual
   filename/path of your book's PDF file, once it's uploaded to
   the same folder as this page — or a full URL if it's hosted
   elsewhere (e.g. Google Drive direct-download link, Dropbox, S3).
   ============================================================ */
const PDF_FILE = "own-the-buyer.pdf";
document.getElementById('downloadBtn').setAttribute('href', PDF_FILE);
</script>

</body>
</html>
