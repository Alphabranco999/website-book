<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Confirmed — Own The Buyer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap');
  :root{
    --ink:#101210; --gold:#E8A93A; --bone:#F1ECE1; --slate:#9BA6AF;
    --teal:#3FA089; --line: rgba(241,236,225,0.12); --radius:3px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; background:var(--ink); color:var(--bone);
    font-family:'Source Sans 3', sans-serif; line-height:1.6;
    display:flex; align-items:center; justify-content:center; padding:24px;
  }
  h1,h2,.display{ font-family:'Oswald', sans-serif; text-transform:uppercase; letter-spacing:0.02em; margin:0; }
  .card{
    max-width:520px; width:100%; text-align:center; border:1px solid var(--line);
    background:#151815; padding:48px 36px; border-radius:var(--radius);
  }
  .check{
    width:64px; height:64px; margin:0 auto 20px; border-radius:50%;
    background:rgba(63,160,137,0.15); border:1px solid var(--teal);
    display:flex; align-items:center; justify-content:center;
  }
  .check svg{ width:30px; height:30px; }
  .eyebrow{
    font-family:'JetBrains Mono', monospace; font-size:12px; letter-spacing:0.18em;
    text-transform:uppercase; color:var(--teal); margin-bottom:10px;
  }
  h1{ font-size:26px; margin-bottom:14px; }
  p{ color:var(--slate); font-size:15px; margin:0 0 28px; }
  .btn{
    display:inline-flex; align-items:center; gap:8px; padding:15px 26px; border-radius:var(--radius);
    font-family:'Oswald'; font-weight:600; text-transform:uppercase; letter-spacing:0.05em; font-size:14px;
    text-decoration:none; background:var(--gold); color:var(--ink); border:none; cursor:pointer;
  }
  .btn:hover{ background:#f2b752; }
  .note{ margin-top:22px; font-size:12px; color:var(--slate); }
  .note a{ color:var(--gold); }
</style>
</head>
<body>

<div class="card">
  <div class="check">
    <svg viewBox="0 0 24 24" fill="none" stroke="#3FA089" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>
  <div class="eyebrow">Payment confirmed</div>
  <h1>You're in. Thank you.</h1>
  <p>Your payment for <b>Own The Buyer</b> went through. Your PDF download is ready below — save it somewhere you'll find it again.</p>

  <a class="btn" href="own-the-buyer.pdf" download>Download Your PDF</a>

  <div class="note">
    Trouble downloading? Message the authors directly: 0758 133 343 · 0753 553 350<br>
    <a href="index.html">Back to the book page</a>
  </div>
</div>

</html>
