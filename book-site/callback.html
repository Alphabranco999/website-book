<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment status — OWN THE BUYER</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;600&family=Work+Sans:wght@400;500;600&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --maroon:#4A1420; --parchment:#F3E9D2; --ink:#241512; --gold:#C6963C; --gold-bright:#E0B45C; --line:rgba(36,21,18,0.15);
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh;
    background:var(--parchment); color:var(--ink);
    font-family:'Work Sans', sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
  }
  .card{
    background:#fff; max-width:440px; width:100%;
    border:1px solid var(--line); border-radius:4px;
    padding:38px 32px; text-align:center;
  }
  h1{ font-family:'Fraunces', serif; font-size:22px; margin:18px 0 8px; }
  p{ font-size:14px; color:var(--ink); opacity:0.75; margin:0 0 6px; }
  .mono{ font-family:'Roboto Mono', monospace; font-size:12px; opacity:0.55; }
  .spinner{
    width:34px; height:34px; margin:0 auto 6px;
    border:3px solid var(--line); border-top-color:var(--gold); border-radius:50%;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg);} }
  .stamp{
    width:64px; height:64px; margin:0 auto; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-family:'Fraunces', serif; font-size:28px;
  }
  .stamp.ok{ border:2px solid var(--gold); color:var(--gold); }
  .stamp.fail{ border:2px solid #A32D2D; color:#A32D2D; }
  a.home{ display:inline-block; margin-top:22px; font-family:'Roboto Mono', monospace; font-size:12px; color:var(--maroon); text-decoration:underline; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="spinner"></div>
    <h1>Confirming your payment&hellip;</h1>
    <p>This usually takes a few seconds.</p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const orderTrackingId = params.get('OrderTrackingId');
    const cardEl = document.getElementById('card');

    async function checkStatus(attempt) {
      if (!orderTrackingId) {
        cardEl.innerHTML = '<h1>Something went wrong</h1><p>No order reference was found in the link. If you completed a payment, contact us with your phone number so we can look it up.</p><a class="home" href="/">Back to the book</a>';
        return;
      }

      try {
        const res = await fetch('/api/payment-status?orderTrackingId=' + encodeURIComponent(orderTrackingId));
        const data = await res.json();

        if (data.payment_status_description === 'Completed') {
          cardEl.innerHTML =
            '<div class="stamp ok">&#10003;</div>' +
            '<h1>Payment received</h1>' +
            '<p>Thank you — your copy of <em>The Boda Economy</em> is confirmed.</p>' +
            '<p class="mono">Reference ' + (data.merchant_reference || '') + '</p>' +
            '<a class="home" href="/">Back to the book</a>';
        } else if (data.payment_status_description === 'Failed' || data.payment_status_description === 'Invalid') {
          cardEl.innerHTML =
            '<div class="stamp fail">&#10005;</div>' +
            '<h1>Payment not completed</h1>' +
            '<p>' + (data.description || 'The payment did not go through.') + '</p>' +
            '<a class="home" href="/">Try again</a>';
        } else if (attempt < 6) {
          setTimeout(() => checkStatus(attempt + 1), 2500);
        } else {
          cardEl.innerHTML =
            '<h1>Still confirming&hellip;</h1>' +
            '<p>This is taking longer than usual. If money left your account, your order is still safe — check back shortly or contact us with your reference.</p>' +
            '<p class="mono">Reference ' + (data.merchant_reference || orderTrackingId) + '</p>' +
            '<a class="home" href="/">Back to the book</a>';
        }
      } catch (err) {
        cardEl.innerHTML = '<h1>Could not check payment status</h1><p>Please contact us with your order reference.</p><a class="home" href="/">Back to the book</a>';
      }
    }

    checkStatus(0);
  </script>
</body>
</html>
